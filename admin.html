<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=700;900&family=Plus+Jakarta+Sans:wght=700;800&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 60px 20px; background: #fdfbf7; color: #121212; display: flex; flex-direction: column; align-items: center; min-height: 90vh; margin: 0; }
        h2 { font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 2rem; text-transform: uppercase; margin-bottom: 25px; letter-spacing: -1px; }
        .admin-container { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 40px; width: 100%; max-width: 1100px; display: none; }
        .form-wrap { flex: 1; min-width: 300px; max-width: 450px; }
        .manage-wrap { flex: 1.2; min-width: 320px; max-width: 600px; background: white; padding: 30px; border: 4px solid #121212; border-radius: 16px; box-shadow: 6px 6px 0px 0px #121212; box-sizing: border-box; }
        form { background: white; padding: 30px; border: 4px solid #121212; border-radius: 16px; width: 100%; box-shadow: 6px 6px 0px 0px #121212; box-sizing: border-box; }
        label { font-weight: 800; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; }
        input, textarea { width: 100%; margin-bottom: 20px; padding: 12px 16px; display: block; border: 3px solid #121212; border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; font-family: inherit; font-weight: 700; background: #fff; }
        input:focus, textarea:focus { outline: none; background: #fffdf0; border-color: #FF914D; }
        .file-status { font-size: 0.85rem; font-weight: 800; color: #555; margin-top: -15px; margin-bottom: 20px; display: block; word-break: break-all; }
        button { font-family: 'Space Grotesk', sans-serif; background: #FFDE59; border: 3px solid #121212; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 1.1rem; box-shadow: 4px 4px 0px 0px #121212; transition: transform 0.1s, box-shadow 0.1s; width: 100%; text-transform: uppercase; }
        button:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #121212; }
        button:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }
        
        .manage-title { font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 1.6rem; text-transform: uppercase; margin-top: 0; margin-bottom: 25px; border-bottom: 4px solid #121212; padding-bottom: 10px; }
        .project-list { max-height: 550px; overflow-y: auto; padding-right: 5px; }
        .project-item { display: flex; align-items: center; gap: 15px; border: 3px solid #121212; border-radius: 12px; padding: 15px; margin-bottom: 15px; background: #fffdf9; box-shadow: 3px 3px 0px 0px #121212; }
        .item-thumb { width: 70px; height: 70px; object-fit: cover; border: 2px solid #121212; border-radius: 6px; flex-shrink: 0; }
        .item-info { flex-grow: 1; min-width: 0; }
        .item-title { font-weight: 800; font-size: 1.1rem; margin: 0 0 5px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-desc { font-size: 0.8rem; color: #555; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .btn-action { font-family: 'Space Grotesk', sans-serif; padding: 6px 10px; border: 2px solid #121212; border-radius: 6px; cursor: pointer; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; box-shadow: 2px 2px 0px 0px #121212; transition: transform 0.1s, box-shadow 0.1s; text-align: center; }
        .btn-action:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px #121212; }
        .btn-edit { background: #78DEC7; }
        .btn-delete { background: #FF7B7B; color: #121212; }
        .btn-cancel { background: #e0e0e0; margin-top: 10px; }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1100px; margin-bottom: 20px; }
        .btn-back { display: inline-block; font-family: 'Space Grotesk', sans-serif; background: #fff; border: 3px solid #121212; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 0.95rem; text-transform: uppercase; box-shadow: 3px 3px 0px 0px #121212; text-decoration: none; color: #121212; }
        .btn-back:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px 0px #121212; }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Dashboard Admin</h2>
        <a href="index.html" class="btn-back">Lihat Website</a>
    </div>

    <div class="admin-container" id="adminContainer">
        <div class="form-wrap">
            <h3 id="formTitle" style="font-family: 'Space Grotesk', sans-serif; font-weight: 900; text-transform: uppercase; margin-top: 0; margin-bottom: 20px;">Tambah Proyek Baru</h3>
            <form id="projectForm">
                <label for="title">Judul Proyek</label>
                <input type="text" id="title" placeholder="Nama aplikasi / hardware" required>
                
                <label for="description">Deskripsi</label>
                <textarea id="description" rows="4" placeholder="Penjelasan singkat mengenai fitur proyek..." required></textarea>
                
                <label for="image_file">Unggah Gambar</label>
                <input type="file" id="image_file" accept="image/*" required>
                <span class="file-status" id="uploadStatus">Belum ada file dipilih</span>
                
                <label for="link_project">Link Tautan Proyek (Github / Live Demo)</label>
                <input type="url" id="link_project" placeholder="https://github.com/..." required>
                
                <button type="submit" id="btnSubmit">Unggah Proyek</button>
                <button type="button" id="btnCancelEdit" class="btn-cancel" style="display:none;">Batal Edit</button>
            </form>
        </div>

        <div class="manage-wrap">
            <h3 class="manage-title">Kelola Proyek Terdaftar</h3>
            <div class="project-list" id="projectList">
                <p style="text-align: center; color: #555; font-weight: 700; padding: 20px;">Memuat daftar proyek...</p>
            </div>
        </div>
    </div>

    <script>
        const USERNAME = "dilloh";
        const PASSWORD = "fadhil.nada";
        
        let projectsCache = [];
        let isEditMode = false;
        let editProjectId = null;
        let originalImageUrl = "";

        function runAuth() {
            const user = prompt("Username Admin:");
            const pass = prompt("Password Admin:");

            if (user === USERNAME && pass === PASSWORD) {
                document.getElementById('adminContainer').style.display = 'flex';
                loadAdminProjects();
            } else {
                alert("Akses ditolak!");
                window.location.href = "index.html";
            }
        }

        window.onload = () => { runAuth(); };

        // Handle file name display
        document.getElementById('image_file').addEventListener('change', function(e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : "Belum ada file dipilih";
            document.getElementById('uploadStatus').innerText = fileName;
        });

        // Load projects to the admin management panel
        async function loadAdminProjects() {
            const listContainer = document.getElementById('projectList');
            try {
                const res = await fetch('/api/get_projects');
                if (!res.ok) throw new Error("Gagal mengambil data proyek");
                
                const result = await res.json();
                projectsCache = result.data || [];
                
                if (projectsCache.length === 0) {
                    listContainer.innerHTML = `<p style="text-align: center; color: #555; font-weight: 700; padding: 20px;">Belum ada proyek yang terdaftar.</p>`;
                    return;
                }
                
                listContainer.innerHTML = projectsCache.map(p => `
                    <div class="project-item">
                        <img src="${p.image_url}" alt="${p.title}" class="item-thumb" onerror="this.src='https://placehold.co/100x100?text=No+Image'">
                        <div class="item-info">
                            <h4 class="item-title">${p.title}</h4>
                            <p class="item-desc">${p.description || 'Tidak ada deskripsi.'}</p>
                        </div>
                        <div class="item-actions">
                            <button onclick="startEdit(${p.id})" class="btn-action btn-edit">Edit</button>
                            <button onclick="deleteProject(${p.id})" class="btn-action btn-delete">Hapus</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                listContainer.innerHTML = `<p style="text-align: center; color: #ff5252; font-weight: 700; padding: 20px;">Gagal memuat daftar proyek.</p>`;
            }
        }

        // Switch to Edit Mode
        function startEdit(id) {
            const project = projectsCache.find(p => p.id === id);
            if (!project) return;
            
            isEditMode = true;
            editProjectId = id;
            originalImageUrl = project.image_url;
            
            document.getElementById('title').value = project.title;
            document.getElementById('description').value = project.description;
            document.getElementById('link_project').value = project.link_project;
            
            // Image file is optional when editing
            document.getElementById('image_file').required = false;
            document.getElementById('uploadStatus').innerText = "Menggunakan gambar saat ini (Pilih file baru jika ingin mengubah)";
            
            document.getElementById('formTitle').innerText = "Edit Proyek";
            document.getElementById('btnSubmit').innerText = "Simpan Perubahan";
            document.getElementById('btnCancelEdit').style.display = 'block';
            
            // Scroll to form smoothly
            document.getElementById('projectForm').scrollIntoView({ behavior: 'smooth' });
        }

        // Cancel Edit Mode
        function cancelEdit() {
            isEditMode = false;
            editProjectId = null;
            originalImageUrl = "";
            
            document.getElementById('projectForm').reset();
            document.getElementById('image_file').required = true;
            document.getElementById('uploadStatus').innerText = "Belum ada file dipilih";
            
            document.getElementById('formTitle').innerText = "Tambah Proyek Baru";
            document.getElementById('btnSubmit').innerText = "Unggah Proyek";
            document.getElementById('btnCancelEdit').style.display = 'none';
        }

        document.getElementById('btnCancelEdit').addEventListener('click', cancelEdit);

        // Delete project
        async function deleteProject(id) {
            if (!confirm("Apakah Anda yakin ingin menghapus proyek ini? File gambar di server juga akan otomatis terhapus.")) return;
            
            try {
                const res = await fetch(`/api/get_projects/${id}`, {
                    method: 'DELETE'
                });
                
                const result = await res.json();
                if (res.ok) {
                    alert("Sukses! Proyek berhasil dihapus.");
                    if (isEditMode && editProjectId === id) {
                        cancelEdit();
                    }
                    loadAdminProjects();
                } else {
                    throw new Error(result.message || "Gagal menghapus proyek");
                }
            } catch (err) {
                alert("Kendala: " + err.message);
            }
        }

        // Submit form (Create / Update)
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            const uploadStatus = document.getElementById('uploadStatus');
            const fileInput = document.getElementById('image_file');
            
            let uploadedImageUrl = originalImageUrl;
            
            try {
                btnSubmit.disabled = true;
                
                // --- PROSES 1: UPLOAD GAMBAR BARU JIKA DIPILIH ---
                if (fileInput.files.length > 0) {
                    btnSubmit.innerText = "Mengunggah Gambar...";
                    uploadStatus.innerText = "Mengunggah file ke server lokal...";
                    
                    const formdata = new FormData();
                    formdata.append('image', fileInput.files[0]);

                    const uploadRes = await fetch('/api/upload', {
                        method: 'POST',
                        body: formdata
                    });

                    const uploadData = await uploadRes.json();
                    if (!uploadRes.ok) {
                        throw new Error(uploadData.message || 'Gagal mengunggah file gambar ke server.');
                    }
                    
                    uploadedImageUrl = uploadData.file?.url;
                    if (!uploadedImageUrl) {
                        throw new Error('Respons upload tidak menyertakan URL file.');
                    }
                } else if (!isEditMode) {
                    // New project must have an image
                    alert("Pilih file gambar terlebih dahulu!");
                    btnSubmit.disabled = false;
                    return;
                }

                // --- PROSES 2: SIMPAN DATA KE SQLITE (CREATE JIKA BARU, UPDATE JIKA EDIT) ---
                btnSubmit.innerText = isEditMode ? "Menyimpan Perubahan..." : "Menyimpan Proyek...";
                uploadStatus.innerText = "Mengirim data entitas ke database...";
                
                const projectTitle = document.getElementById('title').value;
                const projectDescription = document.getElementById('description').value;
                const projectLink = document.getElementById('link_project').value;

                const dataProyek = {
                    title: projectTitle,
                    description: projectDescription,
                    image_url: uploadedImageUrl,
                    link_project: projectLink
                };

                const url = isEditMode ? `/api/get_projects/${editProjectId}` : '/api/get_projects';
                const method = isEditMode ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dataProyek)
                });
                
                const result = await res.json();
                if (res.ok) {
                    alert(isEditMode ? "Sukses! Perubahan proyek berhasil disimpan." : "Sukses! Proyek baru berhasil ditambahkan.");
                    cancelEdit();
                    loadAdminProjects();
                } else {
                    throw new Error(result.message || "Gagal menyimpan entitas proyek.");
                }

            } catch (error) {
                console.error("System Error:", error);
                alert("Terjadi Kendala: " + error.message);
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = isEditMode ? "Simpan Perubahan" : "Unggah Proyek";
            }
        });
    </script>
</body>
</html>
