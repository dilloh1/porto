<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 60px 20px; background: #fdfbf7; color: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        h2 { font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 2rem; text-transform: uppercase; margin-bottom: 25px; letter-spacing: -1px; }
        form { background: white; padding: 30px; border: 4px solid #121212; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 6px 6px 0px 0px #121212; display: none; }
        label { font-weight: 800; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.85rem; }
        input, textarea { width: 100%; margin-bottom: 20px; padding: 12px 16px; display: block; border: 2px solid #121212; border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; font-family: inherit; font-weight: 700; background: #fff; }
        input:focus, textarea:focus { outline: none; background: #fffdf0; border-color: #FF914D; }
        button { font-family: 'Space Grotesk', sans-serif; background: #FFDE59; border: 3px solid #121212; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 1.1rem; box-shadow: 4px 4px 0px 0px #121212; transition: transform 0.1s, box-shadow 0.1s; width: 100%; text-transform: uppercase; }
        button:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #121212; }
    </style>
</head>
<body>

    <h2>Tambah Proyek Baru</h2>
    <form id="projectForm">
        <label for="title">Judul Proyek</label>
        <input type="text" id="title" placeholder="Nama aplikasi / hardware" required>
        
        <label for="description">Deskripsi</label>
        <textarea id="description" rows="4" placeholder="Penjelasan singkat mengenai fitur proyek..." required></textarea>
        
        <label for="image_url">Link Gambar URL</label>
        <input type="url" id="image_url" placeholder="https://domain.com/foto.png" required>
        
        <label for="link_project">Link Tautan Proyek (Github / Live)</label>
        <input type="url" id="link_project" placeholder="https://github.com/..." required>
        
        <button type="submit">Unggah Proyek</button>
    </form>

    <script>
        const USERNAME = "dilloh";
        const PASSWORD = "fadhil.nada";

        function runAuth() {
            const user = prompt("Username Admin:");
            const pass = prompt("Password Admin:");

            if (user === USERNAME && pass === PASSWORD) {
                document.getElementById('projectForm').style.display = 'block';
            } else {
                alert("Akses ditolak! Kredensial tidak valid.");
                window.location.href = "index.html";
            }
        }

        window.onload = () => {
            runAuth();
        };

        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                image_url: document.getElementById('image_url').value,
                link_project: document.getElementById('link_project').value
            };

            try {
                // Mengirimkan POST request ke Vercel Serverless Function
                const res = await fetch('/api/get_projects', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    alert("Sukses! Data proyek baru berhasil masuk ke database SQLite.");
                    document.getElementById('projectForm').reset();
                } else {
                    alert("Gagal memproses data melalui serverless function Vercel.");
                }
            } catch (error) {
                console.error("Error submit:", error);
                alert("Tidak dapat terhubung ke server database.");
            }
        });
    </script>
</body>
</html>
